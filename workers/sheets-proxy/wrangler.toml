name = "tasleya-sheets-proxy"
main = "src/index.js"
compatibility_date = "2026-03-23"
workers_dev = true

[vars]
# NOTE: Sheet CSV URLs are configured as Worker secrets in Cloudflare.
# Do not add *_SHEET_CSV_URL or SHEET_CSV_URL here, or local deploys will
# overwrite remote secret/var values.

ALLOWED_ORIGIN = "https://tasleya.online,https://tasleya-preview.pages.dev"
CACHE_TTL_SECONDS = "300"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
