<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لعبة الكويز</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="scoreboard" aria-label="لوحة النقاط">
        <h1>🎯 لعبة الكويز</h1>
        <div class="team-card" id="team1Card">
          <h2>الفريق الأول</h2>
          <p class="score" id="team1Score">0</p>
        </div>
        <div class="team-card" id="team2Card">
          <h2>الفريق الثاني</h2>
          <p class="score" id="team2Score">0</p>
        </div>
        <div class="status-box">
          <p>الدور الحالي</p>
          <p class="current-team" id="currentTeam">الفريق الأول</p>
        </div>
        <div class="status-box">
          <p>السؤال</p>
          <p class="counter" id="questionCounter">0 / 0</p>
        </div>
      </aside>

      <main class="quiz-area">
        <header class="quiz-header">
          <div class="meta" id="metaInfo">الفئة: — | الصعوبة: — | النقاط: —</div>
          <div class="timer" id="timer" aria-live="polite">30</div>
        </header>

        <section class="question-box">
          <img id="questionImage" alt="صورة السؤال" hidden />
          <h2 id="questionText">اضغط "لعبة جديدة" للبدء.</h2>
          <div id="choices" class="choices"></div>
          <p id="answerText" class="answer" hidden></p>
        </section>

        <footer class="controls">
          <button id="revealBtn" disabled>إظهار الإجابة</button>
          <button id="correctBtn" disabled>إجابة صحيحة (+نقاط)</button>
          <button id="nextBtn" disabled>السؤال التالي</button>
          <button id="newGameBtn">لعبة جديدة</button>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
