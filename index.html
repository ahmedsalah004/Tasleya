<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسلية</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="startScreen">
      <button id="startBtn">تحيا جمهورية مصر العربية</button>
    </div>

    <div id="gameScreen" style="display: none;">
      <div class="bg-animated" aria-hidden="true">
        <div class="bg-particles"></div>
      </div>

      <div class="app">
        <aside class="sidebar" aria-label="لوحة النقاط">
          <h1>تسلية</h1>

        <div id="errorBanner" class="error-banner hidden" role="alert"></div>

        <div class="team-card" id="team1Card">
          <label for="team1NameInput" class="team-name-label">اسم الفريق 1</label>
          <input id="team1NameInput" class="team-name-input" type="text" value="الفريق الأول" maxlength="30" />
          <p class="score" id="team1Score">0</p>
          <div class="score-adjustments" aria-label="تعديل نقاط الفريق الأول">
            <button id="team1PlusBtn" class="secondary-btn adjust-btn" type="button">+100</button>
            <button id="team1MinusBtn" class="danger-btn adjust-btn" type="button">-100</button>
          </div>
        </div>

        <div class="team-card" id="team2Card">
          <label for="team2NameInput" class="team-name-label">اسم الفريق 2</label>
          <input id="team2NameInput" class="team-name-input" type="text" value="الفريق الثاني" maxlength="30" />
          <p class="score" id="team2Score">0</p>
          <div class="score-adjustments" aria-label="تعديل نقاط الفريق الثاني">
            <button id="team2PlusBtn" class="secondary-btn adjust-btn" type="button">+100</button>
            <button id="team2MinusBtn" class="danger-btn adjust-btn" type="button">-100</button>
          </div>
        </div>

        <div class="status-card">
          <p>الدور الحالي:</p>
          <p id="currentTurn">الفريق الأول</p>
        </div>

        <button id="newGameBtn" class="primary-btn">لعبة جديدة</button>
      </aside>

      <main>
        <section class="board-wrap" aria-label="لوحة سين جيم">
          <div id="board" class="board" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <div id="questionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="questionText">
      <div class="modal-content">
        <button id="closeModalBtn" class="ghost-btn" type="button">إغلاق</button>
        <div id="questionTimer" class="question-timer" aria-live="polite">00:00</div>
        <h2 id="questionText">السؤال</h2>
        <img id="questionImage" alt="صورة السؤال" hidden />
        <p id="answerText" class="answer hidden"></p>

        <div id="choicesBox" class="choices-box hidden">
          <h3>اختيارات المساعدة</h3>
          <div id="choicesList" class="choices-list"></div>
        </div>

        <div class="modal-actions">
          <button id="lifelineBtn" class="secondary-btn" type="button">مساعدة (اختيارات)</button>
          <button id="revealBtn" class="secondary-btn" type="button">إظهار الإجابة</button>
          <button id="correctBtn" class="success-btn" type="button">إجابة صحيحة (+points)</button>
          <button id="wrongBtn" class="danger-btn" type="button">إجابة خاطئة</button>
          <button id="otherTeamBtn" class="danger-btn" type="button">إجابة الفريق الآخر</button>
        </div>
      </div>
    </div>

    <div id="categoryModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">
      <div class="modal-content category-modal-content">
        <h2 id="categoryModalTitle">اختر 5 فئات لبدء اللعبة</h2>
        <div class="category-team-inputs" aria-label="أسماء الفرق">
          <label for="categoryTeam1NameInput" class="team-name-label">اسم الفريق الأول</label>
          <input
            id="categoryTeam1NameInput"
            class="team-name-input"
            type="text"
            maxlength="30"
            placeholder="الفريق الأول"
          />

          <label for="categoryTeam2NameInput" class="team-name-label">اسم الفريق الثاني</label>
          <input
            id="categoryTeam2NameInput"
            class="team-name-input"
            type="text"
            maxlength="30"
            placeholder="الفريق الثاني"
          />
        </div>
        <p id="categoryCounter" class="category-counter">المحدد: 0 / 5</p>
        <div id="categoryList" class="category-list" aria-label="قائمة الفئات"></div>

        <div class="modal-actions">
          <button id="startGameBtn" class="success-btn" type="button" disabled>بدء اللعبة</button>
          <button id="randomCategoriesBtn" class="secondary-btn" type="button">اختيار عشوائي (5)</button>
          <button id="cancelCategoryBtn" class="ghost-btn" type="button">إلغاء</button>
        </div>
      </div>
    </div>

    <div id="podiumModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="podiumTitle">
      <div class="modal-content podium-content">
        <h2 id="podiumTitle">نهاية اللعبة</h2>
        <p id="podiumSubtitle" class="podium-subtitle"></p>
        <div id="podiumBoard" class="podium-board"></div>
        <button id="podiumNewGameBtn" class="primary-btn" type="button">لعبة جديدة</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
