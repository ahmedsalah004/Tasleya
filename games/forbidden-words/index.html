<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ممنوع تقولها | تسلية</title>
    <meta name="description" content="قريبًا — لعبة شرح الكلمات بدون قول الكلمات الممنوعة." />
    <style>
      :root {
        --navy-900: #050d24;
        --gold-300: #ffe8a0;
        --gold-400: #ffd76e;
        --text-main: #f5f8ff;
        --text-muted: rgba(228, 238, 255, 0.84);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Tahoma", "Arial", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at 15% 10%, rgba(255, 219, 118, 0.12), transparent 40%),
          radial-gradient(circle at 85% 0%, rgba(64, 116, 255, 0.22), transparent 38%),
          linear-gradient(180deg, #03091d 0%, var(--navy-900) 48%, #030917 100%);
        padding: clamp(1rem, 3vw, 2rem);
      }

      .shell {
        width: min(880px, 100%);
        margin: 0 auto;
      }

      .top-nav {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        text-decoration: none;
        color: var(--gold-300);
        border: 1px solid rgba(244, 206, 108, 0.45);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        background: rgba(14, 27, 67, 0.38);
      }

      h1 {
        margin: 1rem 0 0.6rem;
        font-size: clamp(1.8rem, 4.6vw, 2.9rem);
        color: var(--gold-400);
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.85;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="top-nav" href="/games/">← العودة للألعاب</a>
      <h1>ممنوع تقولها</h1>
      <p>قريبًا — لعبة شرح الكلمات بدون قول الكلمات الممنوعة.</p>
    </main>
  </body>
</html>
