      <section id="setupScreen" class="screen" aria-label="إعداد أسماء الفرق">
        <div class="panel">
          <h2>إعداد الفرق</h2>
          <div class="setup-grid">
            <label>
              اسم الفريق الأول
              <input id="teamOneInput" type="text" value="الفريق الأول" maxlength="24" />
            </label>
            <label>
              اسم الفريق الثاني
              <input id="teamTwoInput" type="text" value="الفريق الثاني" maxlength="24" />
            </label>
            <button id="setupStartBtn" class="btn btn-primary" type="button">ابدأ اللعبة</button>
          </div>
        </div>
      </section>

      <section id="resumeScreen" class="screen" aria-label="استئناف لعبة أفلام">
        <div class="panel">
          <h2>لعبة غير مكتملة</h2>
          <p class="subtitle" style="margin-top:.7rem;">يوجد تقدم محفوظ. هل تريد إكمال اللعبة السابقة أم بدء لعبة جديدة؟</p>
          <div class="action-stack">
            <button id="resumeGameBtn" class="btn btn-primary" type="button">أكمل اللعبة</button>
            <button id="discardGameBtn" class="btn btn-secondary" type="button">ابدأ لعبة جديدة</button>
          </div>
        </div>
      </section>

      <section id="boardScreen" class="screen" aria-label="لوحة لعبة الأفلام">
        <div class="panel">
          <div class="status-bar">
            <article class="stat-card">
              <div class="stat-label" id="teamOneLabel">الفريق الأول</div>
              <div class="stat-value" id="teamOneScore">0</div>
            </article>
            <article class="stat-card">
              <div class="stat-label" id="teamTwoLabel">الفريق الثاني</div>
              <div class="stat-value" id="teamTwoScore">0</div>
            </article>
            <article class="stat-card">
              <div class="stat-label">الدور الحالي</div>
              <div class="stat-value" id="turnLabel">الفريق الأول</div>
            </article>
          </div>
          <div id="filmsBoard" class="board-grid" role="list"></div>
        </div>
      </section>

      <section id="revealScreen" class="screen" aria-label="كشف اسم الفيلم">
        <div class="panel">
          <h2>بطاقة التمثيل</h2>
          <p id="revealTurnText" class="subtitle" style="margin-top: 0.6rem"></p>
          <p id="revealPointsText" class="subtitle" style="margin-top: 0.45rem"></p>
          <p class="warning">لا تجعل باقي الفريق يرى الشاشة. الممثل فقط يشاهد الاسم.</p>
          <div id="shownMovieState" class="action-stack">
            <h3 id="movieTitle" class="movie-title"></h3>
            <button id="startActingBtn" class="btn btn-primary" type="button">ابدأ التمثيل</button>
          </div>
        </div>
      </section>

      <section id="timerScreen" class="screen" aria-label="شاشة المؤقت">
        <div class="panel">
          <h2>وقت التمثيل</h2>
          <p id="timerTurnText" class="subtitle" style="margin-top: 0.6rem"></p>
          <p id="timerPointsText" class="subtitle" style="margin-top: 0.45rem"></p>
          <h3 id="timerMovieTitle" class="movie-title"></h3>
          <div id="timerValue" class="timer">90</div>
          <div class="action-stack">
            <button id="correctBtn" class="btn btn-primary" type="button">الفريق الحالي أجاب صح</button>
            <button id="stealBtn" class="btn btn-danger" type="button">انتهى الوقت / فرصة سرقة</button>
          </div>
        </div>
      </section>

      <section id="stealScreen" class="screen" aria-label="نتيجة محاولة السرقة">
        <div class="panel">
          <h2>نتيجة الجولة</h2>
          <p id="stealPromptText" class="subtitle" style="margin-top: 0.6rem"></p>
          <div class="action-stack" style="margin-top: 1rem">
            <button id="stealCurrentCorrectBtn" class="btn btn-secondary" type="button">الفريق الحالي أجاب صح</button>
            <button id="stealOtherCorrectBtn" class="btn btn-primary" type="button">الفريق الآخر سرق النقاط</button>
            <button id="stealNoOneBtn" class="btn btn-danger" type="button">لا أحد أجاب</button>
          </div>
        </div>
      </section>

      <section id="endScreen" class="screen" aria-label="نهاية لعبة أفلام">
        <div class="hero">
          <h2 class="final-title">انتهت اللعبة</h2>
          <p id="finalResult" class="movie-title" style="margin-top: 0.9rem"></p>
          <p id="finalScores" class="final-sub"></p>
          <div class="action-stack" style="margin-top: 1.2rem">
            <button id="playAgainBtn" class="btn btn-primary" type="button">العب مرة أخرى</button>
            <a class="btn btn-secondary" href="/games/" style="text-decoration: none; text-align: center">العودة للألعاب</a>
          </div>
        </div>
      </section>
