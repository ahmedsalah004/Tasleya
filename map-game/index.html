<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>خمن الدولة من الخريطة</title>
    <meta
      name="description"
      content="لعبة خمن الدولة من الخريطة - تحدي فرق بخريطة عالم تفاعلية كبيرة مع نظام نقاط عادل."
    />
    <style>
      :root {
        --bg: #040817;
        --panel: rgba(10, 21, 53, 0.92);
        --line: rgba(170, 193, 255, 0.28);
        --text: #eef3ff;
        --muted: rgba(220, 233, 255, 0.75);
        --accent: #f7d675;
        --team-1: #2d94ff;
        --team-2: #ca5dff;
        --correct: #35cf70;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Tahoma, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 8%, rgba(111, 142, 255, 0.18), transparent 40%),
          radial-gradient(circle at 86% 12%, rgba(210, 109, 255, 0.14), transparent 38%),
          linear-gradient(180deg, #030713 0%, #07122c 55%, #040817 100%);
      }

      .shell {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 0.55rem;
        gap: 0.5rem;
      }

      .back-link {
        align-self: flex-start;
        text-decoration: none;
        color: #ffe7a7;
        border: 1px solid rgba(247, 214, 117, 0.55);
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        background: rgba(13, 26, 63, 0.7);
        font-size: 0.9rem;
      }

      .setup {
        margin: auto;
        width: min(500px, 100%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1rem;
        background: var(--panel);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.38);
      }

      .setup h1 {
        margin: 0;
        color: var(--accent);
        text-align: center;
      }

      .field {
        margin-top: 0.85rem;
        display: grid;
        gap: 0.35rem;
      }

      .field label {
        color: var(--muted);
      }

      .field input {
        height: 46px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(4, 10, 27, 0.95);
        color: var(--text);
        padding: 0 0.8rem;
        font-size: 1rem;
      }

      .btn {
        border: none;
        border-radius: 12px;
        padding: 0.72rem 0.95rem;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
      }

      .btn-primary {
        background: linear-gradient(180deg, #f6d778 0%, #dfb44d 100%);
        color: #301f00;
      }

      #startBtn {
        width: 100%;
        margin-top: 1rem;
      }

      .btn-light {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .btn-accent {
        background: linear-gradient(180deg, #6cf5a8 0%, #27be63 100%);
        color: #092113;
      }

      .game {
        display: none;
        flex: 1;
        min-height: 0;
        gap: 0.48rem;
      }

      .game.active {
        display: flex;
        flex-direction: column;
      }

      .scoreboard {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.55rem;
        background: var(--panel);
        display: grid;
        gap: 0.45rem;
      }

      .score-grid {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.45rem;
      }

      .team-pill,
      .meta-pill {
        border-radius: 10px;
        padding: 0.4rem 0.58rem;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        min-height: 42px;
        display: grid;
        align-content: center;
      }

      .team-pill.team-1 {
        border-color: rgba(45, 148, 255, 0.7);
      }

      .team-pill.team-2 {
        border-color: rgba(202, 93, 255, 0.7);
      }

      .team-pill.active {
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(247, 214, 117, 0.45), 0 10px 20px rgba(0, 0, 0, 0.28);
      }

      .meta-pill {
        text-align: center;
        color: var(--accent);
      }

      .team-name {
        font-size: 0.95rem;
      }

      .team-score {
        font-size: 1.03rem;
      }

      .target {
        text-align: center;
        border: 1px solid rgba(247, 214, 117, 0.35);
        border-radius: 10px;
        padding: 0.5rem;
        font-weight: 800;
        color: var(--accent);
      }

      .turn-panel {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 0.55rem;
        background: rgba(5, 12, 31, 0.85);
        display: grid;
        gap: 0.42rem;
      }

      .turn-indicator {
        font-size: 1.02rem;
        font-weight: 800;
        color: #ffe9ab;
      }

      .turn-instruction {
        color: var(--muted);
        font-weight: 700;
      }

      .accept-answer-btn {
        display: none;
        width: 100%;
      }

      .accept-answer-btn.show {
        display: block;
      }

      .map-stage {
        position: relative;
        flex: 1;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 35%, #1d3d81 0%, #122858 48%, #091835 75%, #061127 100%);
      }

      .map-svg {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .country {
        fill: #92aad8;
        stroke: #182f62;
        stroke-width: 0.7;
        vector-effect: non-scaling-stroke;
        cursor: pointer;
        transition: fill 120ms ease;
      }

      .country:hover {
        fill: #b3c3e8;
      }

      .country.team1 {
        fill: var(--team-1);
        stroke: #ddf1ff;
        stroke-width: 2.9;
        filter: drop-shadow(0 0 6px rgba(88, 178, 255, 0.85));
      }

      .country.team2 {
        fill: var(--team-2);
        stroke: #ffe6ff;
        stroke-width: 2.9;
        filter: drop-shadow(0 0 6px rgba(210, 121, 255, 0.85));
      }

      .country.correct {
        fill: var(--correct);
        stroke: #d9ffe7;
        stroke-width: 3.4;
        filter: drop-shadow(0 0 8px rgba(64, 222, 132, 0.95));
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0.75rem;
        background: rgba(2, 6, 19, 0.63);
        backdrop-filter: blur(2px);
      }

      .overlay.active {
        display: flex;
      }

      .popup {
        width: min(450px, 100%);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(9, 18, 44, 0.96);
        padding: 1rem;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.4);
      }

      .popup h2 {
        margin: 0;
        color: var(--accent);
        font-size: 1.15rem;
      }

      .popup p {
        margin: 0.6rem 0 0;
        line-height: 1.65;
      }

      .popup-actions {
        margin-top: 0.9rem;
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 0.5rem;
      }

      .popup-actions .btn {
        flex: 1 1 0;
        min-width: 0;
        height: 48px;
        min-height: 48px;
        padding: 0.72rem 0.75rem;
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.2;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      .loading,
      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1rem;
        background: rgba(2, 8, 20, 0.9);
      }

      @media (max-width: 840px) {
        .shell {
          padding: 0.4rem;
        }

        .score-grid {
          grid-template-columns: 1fr;
        }

        .meta-pill,
        .team-pill {
          text-align: center;
        }
      }

      @media (max-width: 420px) {
        .popup-actions .btn {
          height: 44px;
          min-height: 44px;
          padding: 0.62rem 0.58rem;
          font-size: 0.94rem;
          line-height: 1.15;
        }
      }

      @media (max-width: 360px) {
        .popup-actions .btn {
          height: 40px;
          min-height: 40px;
          padding: 0.52rem 0.44rem;
          font-size: 0.86rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back-link" href="/games/">← العودة إلى الألعاب</a>

      <section class="setup" id="setupScreen">
        <h1>خمن الدولة من الخريطة</h1>
        <div class="field">
          <label for="team1Name">اسم الفريق الأول</label>
          <input id="team1Name" type="text" maxlength="30" placeholder="الفريق الأول" />
        </div>
        <div class="field">
          <label for="team2Name">اسم الفريق الثاني</label>
          <input id="team2Name" type="text" maxlength="30" placeholder="الفريق الثاني" />
        </div>
        <button class="btn btn-primary" id="startBtn" type="button">ابدأ اللعبة</button>
      </section>

      <section class="game" id="gameScreen" aria-live="polite">
        <header class="scoreboard">
          <div class="score-grid">
            <div class="team-pill team-1" id="team1Card">
              <span class="team-name" id="team1Label">الفريق الأول</span>
              <span class="team-score"><span id="team1Score">0</span> نقطة</span>
            </div>
            <div class="meta-pill" id="questionMeta">السؤال 1 من 20 — سهل — 100 نقطة</div>
            <div class="team-pill team-2" id="team2Card">
              <span class="team-name" id="team2Label">الفريق الثاني</span>
              <span class="team-score"><span id="team2Score">0</span> نقطة</span>
            </div>
          </div>
          <div class="target" id="targetCountry">الدولة المطلوبة: —</div>
          <div class="turn-panel">
            <div class="turn-indicator" id="turnIndicator">الدور الآن: —</div>
            <div class="turn-instruction" id="turnInstruction">—</div>
            <button class="btn btn-light accept-answer-btn" id="acceptActiveAnswerBtn" type="button"></button>
          </div>
        </header>

        <section class="map-stage" id="mapStage">
          <div class="loading" id="mapLoading">جاري تحميل الخريطة...</div>

          <div class="overlay" id="overlay">
            <div class="popup">
              <h2 id="overlayTitle"></h2>
              <p id="overlayText"></p>
              <div class="popup-actions" id="overlayActions"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const POINTS = { easy: 100, medium: 300, hard: 500 };
      const DIFFICULTY_AR = { easy: "سهل", medium: "متوسط", hard: "صعب" };
      const QUESTIONS_CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlW5DmKhM4RajmahB2Z06DDw_xEtzw_RUvWT5vse4Jx2VLp-dQMSQ7R0MzMMox8pulLQvzFsvbndaj/pub?output=csv";
      const CSV_LOAD_ERROR_AR = "تعذر تحميل بيانات الخريطة. تأكد من الاتصال بالإنترنت ثم أعد المحاولة.";

      const state = {
        started: false,
        questions: [],
        questionPool: [],
        questionIndex: 0,
        teamNames: ["الفريق الأول", "الفريق الثاني"],
        scores: [0, 0],
        teamPicks: [null, null],
        otherTeamAcceptedActiveAnswer: false,
        pendingPick: null,
        phase: "active_pick", // active_pick | other_response | ready_reveal | revealed | finished
        mapReady: false,
        questionsReady: false,
        centroids: new Map(),
        questionByCountryCode: new Map(),
        countryCodeByNormalizedName: new Map(),
        zoomMoved: false,
        moveThreshold: 7,
      };

      const el = {
        setupScreen: document.getElementById("setupScreen"),
        gameScreen: document.getElementById("gameScreen"),
        startBtn: document.getElementById("startBtn"),
        team1Name: document.getElementById("team1Name"),
        team2Name: document.getElementById("team2Name"),
        team1Label: document.getElementById("team1Label"),
        team2Label: document.getElementById("team2Label"),
        team1Score: document.getElementById("team1Score"),
        team2Score: document.getElementById("team2Score"),
        team1Card: document.getElementById("team1Card"),
        team2Card: document.getElementById("team2Card"),
        questionMeta: document.getElementById("questionMeta"),
        targetCountry: document.getElementById("targetCountry"),
        turnIndicator: document.getElementById("turnIndicator"),
        turnInstruction: document.getElementById("turnInstruction"),
        acceptActiveAnswerBtn: document.getElementById("acceptActiveAnswerBtn"),
        mapStage: document.getElementById("mapStage"),
        mapLoading: document.getElementById("mapLoading"),
        overlay: document.getElementById("overlay"),
        overlayTitle: document.getElementById("overlayTitle"),
        overlayText: document.getElementById("overlayText"),
        overlayActions: document.getElementById("overlayActions"),
      };

      const shuffle = (list) => {
        const arr = [...list];
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };

      function normalizeName(name) {
        if (!name) return "";
        return name
          .replace(/\s*\([^)]*\)/g, "")
          .replace("Czechia", "Czech Republic")
          .replace("Eswatini", "Swaziland")
          .trim();
      }

      function buildQuestions() {
        const easy = shuffle(state.questionPool.filter((item) => item.difficulty === "easy" && item.points === 100)).slice(0, 4);
        const medium = shuffle(state.questionPool.filter((item) => item.difficulty === "medium" && item.points === 300)).slice(0, 8);
        const hard = shuffle(state.questionPool.filter((item) => item.difficulty === "hard" && item.points === 500)).slice(0, 8);
        if (easy.length < 4 || medium.length < 8 || hard.length < 8) {
          throw new Error("Not enough valid rows in CSV to build 20 questions");
        }
        return [...easy, ...medium, ...hard];
      }

      function getQuestion() {
        return state.questions[state.questionIndex];
      }

      function currentPoints() {
        return getQuestion().points;
      }

      function activeTeamIndex() {
        return state.questionIndex % 2 === 0 ? 0 : 1;
      }

      function otherTeamIndex() {
        return activeTeamIndex() === 0 ? 1 : 0;
      }

      function selectionTeamIndex() {
        if (state.phase === "active_pick") return activeTeamIndex();
        if (state.phase === "other_response") return otherTeamIndex();
        return null;
      }

      function showOverlay(title, text, actions) {
        el.overlayTitle.textContent = title;
        el.overlayText.textContent = text;
        el.overlayActions.innerHTML = "";
        actions.forEach((action) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `btn ${action.kind || "btn-light"}`;
          button.textContent = action.label;
          button.addEventListener("click", action.onClick, { once: true });
          el.overlayActions.appendChild(button);
        });
        el.overlay.classList.add("active");
      }

      function hideOverlay() {
        el.overlay.classList.remove("active");
      }

      function updateHeader() {
        const q = getQuestion();
        const activeIdx = activeTeamIndex();
        const otherIdx = otherTeamIndex();
        el.team1Label.textContent = state.teamNames[0];
        el.team2Label.textContent = state.teamNames[1];
        el.team1Score.textContent = String(state.scores[0]);
        el.team2Score.textContent = String(state.scores[1]);
        el.questionMeta.textContent = `السؤال ${state.questionIndex + 1} من 20 — ${DIFFICULTY_AR[q.difficulty]} — ${q.points} نقطة`;
        el.targetCountry.textContent = `الدولة المطلوبة: ${q.countryNameAr}`;
        el.team1Card.classList.toggle("active", activeIdx === 0 && ["active_pick", "other_response"].includes(state.phase));
        el.team2Card.classList.toggle("active", activeIdx === 1 && ["active_pick", "other_response"].includes(state.phase));

        if (state.phase === "active_pick") {
          el.turnIndicator.textContent = `الدور الآن: ${state.teamNames[activeIdx]}`;
          el.turnInstruction.textContent = `اختر دولة على الخريطة لفريق ${state.teamNames[activeIdx]}`;
          el.acceptActiveAnswerBtn.classList.remove("show");
        } else if (state.phase === "other_response") {
          el.turnIndicator.textContent = `الآن دور فريق ${state.teamNames[otherIdx]}`;
          el.turnInstruction.textContent = `فريق ${state.teamNames[otherIdx]}: اختر دولة أخرى أو أكّد أن إجابة فريق ${state.teamNames[activeIdx]} صحيحة`;
          el.acceptActiveAnswerBtn.textContent = `إجابة فريق ${state.teamNames[activeIdx]} صحيحة`;
          el.acceptActiveAnswerBtn.classList.add("show");
        } else if (state.phase === "ready_reveal") {
          el.turnIndicator.textContent = "جاهز لإظهار الإجابة";
          el.turnInstruction.textContent = "تم تأكيد الاختيارات. اضغط إظهار الإجابة.";
          el.acceptActiveAnswerBtn.classList.remove("show");
        } else {
          el.turnIndicator.textContent = "—";
          el.turnInstruction.textContent = "—";
          el.acceptActiveAnswerBtn.classList.remove("show");
        }
      }

      function updateMapHighlights() {
        if (!state.mapReady) return;
        const countryNodes = el.mapStage.querySelectorAll(".country");
        const target = getQuestion();
        countryNodes.forEach((node) => {
          const code = node.dataset.countryCode;
          node.classList.remove("team1", "team2", "correct");
          if (state.teamPicks[0]?.countryCode === code) node.classList.add("team1");
          if (state.teamPicks[1]?.countryCode === code) node.classList.add("team2");
          if (state.phase === "revealed" && target.countryCode === code) node.classList.add("correct");
        });
      }

      function haversineKm(a, b) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const R = 6371;
        const dLat = toRad(b[1] - a[1]);
        const dLon = toRad(b[0] - a[0]);
        const lat1 = toRad(a[1]);
        const lat2 = toRad(b[1]);
        const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
        return R * (2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x)));
      }

      function revealAnswer() {
        const q = getQuestion();
        const points = q.points;
        const half = Math.floor(points / 2);
        const activeIdx = activeTeamIndex();
        const otherIdx = otherTeamIndex();
        const pickedCorrect = [state.teamPicks[0]?.countryCode === q.countryCode, state.teamPicks[1]?.countryCode === q.countryCode];

        let result;

        if (state.otherTeamAcceptedActiveAnswer) {
          if (pickedCorrect[activeIdx]) {
            state.scores[activeIdx] += points;
            result = `إجابة ${state.teamNames[activeIdx]} صحيحة — +${points}`;
          } else {
            result = "إجابة الفريق النشط غير صحيحة — لا نقاط لهذا السؤال";
          }
        } else if (pickedCorrect[activeIdx]) {
          state.scores[activeIdx] += points;
          result = `إجابة صحيحة لفريق ${state.teamNames[activeIdx]} — +${points}`;
        } else if (pickedCorrect[otherIdx]) {
          state.scores[otherIdx] += points;
          result = `إجابة صحيحة لفريق ${state.teamNames[otherIdx]} — +${points}`;
        } else {
          const target = state.centroids.get(q.countryCode);
          const c1 = state.centroids.get(state.teamPicks[0]?.countryCode);
          const c2 = state.centroids.get(state.teamPicks[1]?.countryCode);
          if (target && c1 && c2) {
            const d1 = haversineKm(c1, target);
            const d2 = haversineKm(c2, target);
            const tieTolerance = 0.05;
            if (Math.abs(d1 - d2) <= tieTolerance) {
              result = "تعادل في القرب — لا نقاط";
            } else if (d1 < d2) {
              state.scores[0] += half;
              result = `لم يختر أحد الإجابة الصحيحة. أقرب اختيار: فريق ${state.teamNames[0]} — +${half}`;
            } else {
              state.scores[1] += half;
              result = `لم يختر أحد الإجابة الصحيحة. أقرب اختيار: فريق ${state.teamNames[1]} — +${half}`;
            }
          } else {
            result = "تعادل في القرب — لا نقاط";
          }
        }

        state.phase = "revealed";
        updateHeader();
        updateMapHighlights();

        showOverlay("نتيجة السؤال", `${result}\n\nالدولة الصحيحة: ${q.countryNameAr}`, [
          { label: "السؤال التالي", kind: "btn-primary", onClick: goNextQuestion },
        ]);
      }

      function goNextQuestion() {
        hideOverlay();

        if (state.questionIndex >= 19) {
          state.phase = "finished";
          finishGame();
          return;
        }

        state.questionIndex += 1;
        state.phase = "active_pick";
        state.teamPicks = [null, null];
        state.otherTeamAcceptedActiveAnswer = false;
        state.pendingPick = null;
        updateHeader();
        updateMapHighlights();
      }

      function finishGame() {
        const [s1, s2] = state.scores;
        let finalLine = "تعادل رائع بين الفريقين";
        if (s1 > s2) finalLine = `الفائز: ${state.teamNames[0]}`;
        if (s2 > s1) finalLine = `الفائز: ${state.teamNames[1]}`;

        showOverlay(
          "انتهت الجولة",
          `${finalLine}\n${state.teamNames[0]}: ${s1} نقطة — ${state.teamNames[1]}: ${s2} نقطة`,
          [
            {
              label: "إعادة اللعب",
              kind: "btn-primary",
              onClick: () => {
                hideOverlay();
                state.started = false;
                el.gameScreen.classList.remove("active");
                el.setupScreen.style.display = "block";
              },
            },
            { label: "العودة للألعاب", kind: "btn-light", onClick: () => (window.location.href = "/games/") },
          ]
        );
      }

      function confirmPendingPick() {
        const q = getQuestion();
        const teamIdx = selectionTeamIndex();
        if (teamIdx === null) return;

        state.teamPicks[teamIdx] = {
          countryCode: state.pendingPick,
          isCorrect: state.pendingPick === q.countryCode,
        };

        state.pendingPick = null;
        hideOverlay();
        updateMapHighlights();

        if (state.phase === "active_pick") {
          state.phase = "other_response";
          updateHeader();
          return;
        }

        state.phase = "ready_reveal";
        updateHeader();
        showOverlay("جاهز لإظهار الإجابة", "تم تأكيد اختيار الفريقين.", [
          { label: "إظهار الإجابة", kind: "btn-accent", onClick: () => { hideOverlay(); revealAnswer(); } },
        ]);
      }

      function handleCountrySelection(countryCode) {
        if (!["active_pick", "other_response"].includes(state.phase)) return;
        const activeIdx = activeTeamIndex();
        const teamIdx = selectionTeamIndex();
        if (teamIdx === null) return;
        if (!countryCode || !state.questionByCountryCode.has(countryCode)) return;

        if (state.phase === "other_response" && state.teamPicks[activeIdx]?.countryCode === countryCode) {
          showOverlay("تنبيه", "لا يمكن اختيار نفس دولة الفريق الآخر", [{ label: "حسنًا", kind: "btn-light", onClick: hideOverlay }]);
          return;
        }

        state.pendingPick = countryCode;
        const teamName = state.teamNames[teamIdx];

        showOverlay(`تأكيد اختيار ${teamName}`, "هل تريد تأكيد هذه الدولة؟", [
          { label: "تأكيد", kind: "btn-primary", onClick: confirmPendingPick },
          { label: "تغيير الاختيار", kind: "btn-light", onClick: hideOverlay },
        ]);
      }

      function acceptActiveAnswer() {
        if (state.phase !== "other_response") return;
        state.teamPicks[otherTeamIndex()] = null;
        state.otherTeamAcceptedActiveAnswer = true;
        state.phase = "ready_reveal";
        updateHeader();
        showOverlay("جاهز لإظهار الإجابة", "تم اعتماد إجابة الفريق النشط من الفريق الآخر.", [
          { label: "إظهار الإجابة", kind: "btn-accent", onClick: () => { hideOverlay(); revealAnswer(); } },
        ]);
      }

      async function loadMap() {
        try {
          const [d3] = await Promise.all([import("https://cdn.jsdelivr.net/npm/d3@7/+esm")]);
          const response = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson");
          if (!response.ok) throw new Error("Map download failed");
          const geojson = await response.json();

          const width = 1280;
          const height = 760;

          const svg = d3
            .create("svg")
            .attr("class", "map-svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("role", "img")
            .attr("aria-label", "خريطة العالم التفاعلية");

          const projection = d3.geoNaturalEarth1().fitExtent(
            [
              [20, 20],
              [width - 20, height - 20],
            ],
            geojson
          );

          const path = d3.geoPath(projection);
          const mapLayer = svg.append("g");

          geojson.features.forEach((feature) => {
            const normalized = normalizeName(feature.properties.name);
            feature.properties.normalizedName = normalized;
            feature.properties.countryCode = state.countryCodeByNormalizedName.get(normalized) || "";
          });

          mapLayer
            .selectAll("path")
            .data(geojson.features)
            .enter()
            .append("path")
            .attr("class", "country")
            .attr("data-name", (d) => d.properties.normalizedName)
            .attr("data-country-code", (d) => d.properties.countryCode)
            .attr("d", path)
            .on("click", (event, d) => {
              if (state.zoomMoved) return;
              handleCountrySelection(d.properties.countryCode);
            });

          const zoomBehavior = d3
            .zoom()
            .scaleExtent([1, 8])
            .filter((event) => {
              if (event.type === "dblclick") return false;
              return !el.overlay.classList.contains("active");
            })
            .on("start", (event) => {
              state.zoomMoved = false;
              const source = event.sourceEvent;
              if (source && "clientX" in source) {
                state.zoomStartX = source.clientX;
                state.zoomStartY = source.clientY;
              }
            })
            .on("zoom", (event) => {
              mapLayer.attr("transform", event.transform);
              const source = event.sourceEvent;
              if (source && "clientX" in source) {
                const moved = Math.hypot(source.clientX - (state.zoomStartX || 0), source.clientY - (state.zoomStartY || 0));
                if (moved > state.moveThreshold || event.transform.k !== 1) state.zoomMoved = true;
              }
            })
            .on("end", () => {
              window.setTimeout(() => {
                state.zoomMoved = false;
              }, 40);
            });

          svg.call(zoomBehavior);

          el.mapStage.appendChild(svg.node());
          el.mapLoading.remove();
          state.mapReady = true;
          updateMapHighlights();
        } catch (error) {
          el.mapLoading.className = "error";
          el.mapLoading.textContent = "تعذر تحميل الخريطة التفاعلية. تأكد من الإنترنت ثم أعد المحاولة.";
          console.error(error);
        }
      }

      function startGame() {
        if (!state.mapReady || !state.questionsReady) return;

        state.teamNames = [el.team1Name.value.trim() || "الفريق الأول", el.team2Name.value.trim() || "الفريق الثاني"];
        state.scores = [0, 0];
        state.questionIndex = 0;
        try {
          state.questions = buildQuestions();
        } catch (error) {
          showOverlay("خطأ", CSV_LOAD_ERROR_AR, [{ label: "حسنًا", kind: "btn-light", onClick: hideOverlay }]);
          console.error(error);
          return;
        }
        state.phase = "active_pick";
        state.teamPicks = [null, null];
        state.otherTeamAcceptedActiveAnswer = false;
        state.pendingPick = null;
        state.started = true;

        el.setupScreen.style.display = "none";
        el.gameScreen.classList.add("active");
        updateHeader();
        updateMapHighlights();
      }

      el.startBtn.addEventListener("click", startGame);
      el.acceptActiveAnswerBtn.addEventListener("click", acceptActiveAnswer);

      function parseCsvRow(line) {
        const cells = [];
        let cell = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i += 1) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
              cell += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === "," && !inQuotes) {
            cells.push(cell);
            cell = "";
          } else {
            cell += ch;
          }
        }
        cells.push(cell);
        return cells.map((value) => value.trim());
      }

      function parseQuestionsCsv(csvText) {
        const lines = csvText
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        if (!lines.length) throw new Error("CSV is empty");

        const headers = parseCsvRow(lines[0]).map((h) => h.toLowerCase());
        const required = ["country_code", "country_name_ar", "country_name_en", "difficulty", "points", "lat", "lng"];
        const indices = Object.fromEntries(required.map((key) => [key, headers.indexOf(key)]));
        if (required.some((key) => indices[key] === -1)) {
          throw new Error("CSV headers are missing required columns");
        }

        const rows = [];
        for (let i = 1; i < lines.length; i += 1) {
          const cells = parseCsvRow(lines[i]);
          const countryCode = (cells[indices.country_code] || "").toUpperCase();
          const countryNameAr = cells[indices.country_name_ar] || "";
          const countryNameEn = cells[indices.country_name_en] || "";
          const difficulty = (cells[indices.difficulty] || "").toLowerCase();
          const points = Number(cells[indices.points]);
          const lat = Number(cells[indices.lat]);
          const lng = Number(cells[indices.lng]);
          if (!countryCode || !countryNameAr || !countryNameEn || !["easy", "medium", "hard"].includes(difficulty)) continue;
          if (!Number.isFinite(points) || !Number.isFinite(lat) || !Number.isFinite(lng)) continue;
          rows.push({ countryCode, countryNameAr, countryNameEn, difficulty, points, lat, lng });
        }
        return rows;
      }

      async function loadQuestionsFromCsv() {
        try {
          const response = await fetch(QUESTIONS_CSV_URL, { cache: "no-store" });
          if (!response.ok) throw new Error("Questions CSV download failed");
          const csvText = await response.text();
          const questions = parseQuestionsCsv(csvText);
          if (!questions.length) throw new Error("No valid rows in CSV");

          state.questionPool = questions;
          state.questionByCountryCode = new Map(questions.map((item) => [item.countryCode, item]));
          state.countryCodeByNormalizedName = new Map(questions.map((item) => [normalizeName(item.countryNameEn), item.countryCode]));
          state.centroids = new Map(questions.map((item) => [item.countryCode, [item.lng, item.lat]]));
          state.questionsReady = true;
          return true;
        } catch (error) {
          console.error(error);
          state.questionsReady = false;
          showOverlay("خطأ", CSV_LOAD_ERROR_AR, [{ label: "حسنًا", kind: "btn-light", onClick: hideOverlay }]);
          return false;
        }
      }

      async function initializeMapGame() {
        el.startBtn.disabled = true;
        el.startBtn.textContent = "جاري تحميل البيانات...";
        const questionsLoaded = await loadQuestionsFromCsv();
        if (questionsLoaded) {
          await loadMap();
        }
        if (state.mapReady && state.questionsReady) {
          el.startBtn.disabled = false;
          el.startBtn.textContent = "ابدأ اللعبة";
        } else {
          el.startBtn.textContent = "تعذر تحميل البيانات";
        }
      }

      initializeMapGame();
    </script>
  </body>
</html>
